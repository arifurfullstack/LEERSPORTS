    <script>
      // Safeguard to prevent: Cannot set property fetch of #<Window> which has only a getter
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          try {
            window.fetch = originalFetch;
          } catch (e) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (err) {
          console.warn("Could not patch window.fetch getter/setter:", err);
        }
      })();
    </script>
